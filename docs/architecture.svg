  <!-- ─── SECTION LABELS ─── -->
  <!-- CI/CD box -->
  <rect x="14" y="70" width="590" height="340" rx="10" fill="none" stroke="#21262d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="25" y="63" width="130" height="18" rx="4" fill="#0d1117"/>
  <text x="90" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#d29922">⚙  CI/CD Pipeline</text>

  <!-- EKS box -->
  <rect x="620" y="70" width="420" height="340" rx="10" fill="none" stroke="#21262d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="631" y="63" width="120" height="18" rx="4" fill="#0d1117"/>
  <text x="691" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">☸  AWS EKS</text>

  <!-- Monitoring box -->
  <rect x="1056" y="70" width="230" height="340" rx="10" fill="none" stroke="#21262d" stroke-width="1.5" stroke-dasharray="6,3"/>
