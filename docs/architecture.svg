  <text x="213" y="153" text-anchor="middle" font-size="10" font-weight="600" fill="#f0f6fc">Lint (JS Syntax)</text>
  <text x="213" y="166" text-anchor="middle" font-size="9" fill="#8b949e">Frontend + Backend</text>

