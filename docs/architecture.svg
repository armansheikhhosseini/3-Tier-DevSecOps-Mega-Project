  <rect x="148" y="190" width="130" height="36" rx="6" fill="#21262d" stroke="#2ea043" stroke-width="1.5"/>
  <text x="213" y="203" text-anchor="middle" font-size="10" font-weight="600" fill="#f0f6fc">🔍 GitLeaks Scan</text>
  <text x="213" y="216" text-anchor="middle" font-size="9" fill="#8b949e">Secret detection</text>

  <!-- Stage 4: SonarQube -->
  <line x1="213" y1="226" x2="213" y2="240" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
