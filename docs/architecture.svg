  <text x="213" y="103" text-anchor="middle" font-size="10" font-weight="600" fill="#f0f6fc">Git Checkout</text>
  <text x="213" y="116" text-anchor="middle" font-size="9" fill="#8b949e">github.com/armansheikhhosseini</text>

  <!-- Stage 2: Lint -->
  <line x1="213" y1="126" x2="213" y2="140" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
