  <text x="213" y="303" text-anchor="middle" font-size="10" font-weight="600" fill="#f0f6fc">✅ Quality Gate</text>
  <text x="213" y="316" text-anchor="middle" font-size="9" fill="#8b949e">Blocks on failure</text>

  <!-- Stage 6: Trivy FS -->
  <line x1="213" y1="326" x2="213" y2="340" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="148" y="340" width="130" height="36" rx="6" fill="#21262d" stroke="#1a6fb5" stroke-width="1.5"/>
  <text x="213" y="353" text-anchor="middle" font-size="10" font-weight="600" fill="#f0f6fc">🛡 Trivy FS Scan</text>
